<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>New invoice · affluents</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --mist:#F2F4F3; --ink:#14232A; --river:#23617A; --reserve:#B8893D; --earn:#35684F; --contour:#D9DFDD;
  --muted:#5A6A6E; --surface:#FFFFFF; --river-deep:#1C5066;
  --font-display:'EB Garamond',Georgia,serif; --font-body:'Inter',system-ui,-apple-system,sans-serif;
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--mist);color:var(--ink);font-family:var(--font-body)}
a{color:var(--river)} a:hover{color:var(--ink)}
::selection{background:rgba(35,97,122,.16)}
.tnum{font-feature-settings:'tnum';font-variant-numeric:tabular-nums}

.page{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:clamp(28px,7vh,80px) 20px 24px}
.col{width:100%;max-width:480px;display:flex;flex-direction:column;flex:1 1 auto}
.lockup{display:flex;align-items:center;gap:9px;padding-bottom:28px}
.wordmark{font-family:var(--font-display);font-size:21px;font-weight:500;letter-spacing:.01em;line-height:1}

.card{background:var(--surface);border:1px solid var(--contour);border-radius:10px;padding:24px 22px}
.card h1{margin:0;font-family:var(--font-display);font-size:25px;font-weight:500;line-height:1}
.fields{display:flex;flex-direction:column;gap:16px;padding-top:20px}
.field{display:flex;flex-direction:column;gap:6px}
.field .fl{font-size:12px;color:var(--muted)}
.field .fl em{font-style:normal;opacity:.75}
.field input,.field textarea{width:100%;border:1px solid var(--contour);border-radius:6px;padding:10px 12px;font-family:var(--font-body);font-size:14px;color:var(--ink);background:var(--surface);outline:none}
.field input:focus,.field textarea:focus{border-color:var(--river)}
.field textarea{resize:none;line-height:1.5}
.amt-wrap{position:relative}
.amt-wrap input{padding-right:58px;text-align:right;font-size:15px;font-weight:500;font-feature-settings:'tnum'}
.amt-wrap .cur{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:12.5px;color:var(--muted)}
.btn{width:100%;border:none;border-radius:7px;background:var(--river);color:#fff;font-family:var(--font-body);font-size:15px;font-weight:500;padding:13px 18px;cursor:pointer;margin-top:2px}
.btn:hover{background:var(--river-deep)}

.review-tag{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);border:1px solid var(--contour);border-radius:4px;padding:2px 6px}
.gap-label{display:flex;align-items:center;gap:8px;padding:26px 0 12px;font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}

.created .ok{font-size:13px;font-weight:500;color:var(--earn)}
.created .summary{padding-top:8px;font-size:15px;font-weight:600}
.hr{height:1px;background:var(--contour);margin:18px 0 16px}
.linklabel{font-size:12px;color:var(--muted)}
.linkrow{display:flex;align-items:center;gap:8px;padding-top:8px}
.linkrow input{flex:1 1 auto;min-width:0;border:1px solid var(--contour);border-radius:6px;padding:9px 11px;font-family:var(--font-body);font-size:13px;color:var(--river);background:var(--surface);outline:none;font-feature-settings:'tnum'}
.ghost{flex:none;border:1px solid var(--contour);border-radius:6px;background:var(--surface);color:var(--river);font-family:var(--font-body);font-size:12.5px;font-weight:500;padding:9px 14px;cursor:pointer}
.ghost:hover{border-color:var(--river)}
.qrblock{display:flex;flex-direction:column;align-items:center;gap:12px;padding-top:20px}
.qrblock canvas{width:120px;height:120px;background:var(--surface);border:1px solid var(--contour);border-radius:6px}
.qrblock a{font-size:13px;font-weight:500;text-decoration:none}

.spring{flex:1 1 0}
.mark{padding-top:36px;display:flex;flex-direction:column;align-items:center;gap:7px}
.mark svg{color:var(--contour)}
.mark span{font-size:11px;color:var(--muted);letter-spacing:.02em}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<main class="page">
  <div class="col">

    <header class="lockup">
      <svg width="30" height="15" viewBox="0 0 48 24" fill="none" aria-hidden="true">
        <g stroke="var(--ink)" stroke-width="1.4" stroke-linecap="round">
          <path d="M2 4 C10 4, 12 12, 16 12"/><path d="M2 20 C10 20, 12 12, 16 12"/><path d="M2 12 L46 12"/>
          <path d="M32 12 C36 12, 38 4, 46 4"/><path d="M32 12 C36 12, 38 20, 46 20"/>
        </g>
      </svg>
      <span class="wordmark">affluents</span>
    </header>

    <div class="card">
      <h1>New invoice</h1>
      <div class="fields">
        <div class="field">
          <span class="fl">Amount</span>
          <span class="amt-wrap">
            <input id="fAmount" value="100.00" inputmode="decimal">
            <span class="cur">USDC</span>
          </span>
        </div>
        <div class="field">
          <span class="fl">Client label</span>
          <input id="fClient" value="Meridian Studio">
        </div>
        <div class="field">
          <span class="fl">Memo <em>(optional)</em></span>
          <textarea id="fMemo" rows="2">Brand identity — final payment</textarea>
        </div>
        <button class="btn" id="createBtn">Create invoice</button>
      </div>
    </div>

    <div class="gap-label">Success state <span class="review-tag">Review only — replaces the card above</span></div>

    <div class="card created">
      <div class="ok">Invoice created ✓</div>
      <div class="summary tnum" id="summaryLine">2026-015 · Meridian Studio · 100.00 USDC</div>
      <div class="hr"></div>
      <div class="linklabel">Payment link</div>
      <div class="linkrow">
        <input readonly value="affluents.money/pay/2026-015" id="linkField" onfocus="this.select()">
        <button class="ghost" id="copyLink">Copy</button>
      </div>
      <div class="qrblock">
        <canvas id="qr" width="120" height="120" aria-label="Payment link QR code"></canvas>
        <a href="payment.html">Open payment page ↗</a>
      </div>
    </div>

    <div class="spring"></div>

    <footer class="mark">
      <svg width="28" height="14" viewBox="0 0 48 24" fill="none" aria-hidden="true">
        <g stroke="currentColor" stroke-width="1.4" stroke-linecap="round">
          <path d="M2 4 C10 4, 12 12, 16 12" vector-effect="non-scaling-stroke"/><path d="M2 20 C10 20, 12 12, 16 12" vector-effect="non-scaling-stroke"/><path d="M2 12 L46 12" vector-effect="non-scaling-stroke"/>
          <path d="M32 12 C36 12, 38 4, 46 4" vector-effect="non-scaling-stroke"/><path d="M32 12 C36 12, 38 20, 46 20" vector-effect="non-scaling-stroke"/>
        </g>
      </svg>
      <span>affluents.money</span>
    </footer>

  </div>
</main>

<script>
(function () {
  function fmt(v) {
    var n = parseFloat(String(v).replace(/[^0-9.]/g, '')) || 0;
    return n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  document.getElementById('createBtn').addEventListener('click', function () {
    var client = document.getElementById('fClient').value.trim() || 'Client';
    var amount = fmt(document.getElementById('fAmount').value);
    document.getElementById('fAmount').value = amount;
    document.getElementById('summaryLine').textContent = '2026-015 · ' + client + ' · ' + amount + ' USDC';
  });
  document.getElementById('copyLink').addEventListener('click', function () {
    var b = this;
    try { navigator.clipboard.writeText('https://' + document.getElementById('linkField').value); } catch (e) {}
    b.textContent = 'Copied ✓';
    setTimeout(function () { b.textContent = 'Copy'; }, 1800);
  });

  /* Illustrative QR pattern (real deployment encodes the payment link) */
  var canvas = document.getElementById('qr');
  var N = 25, m = 6, q = 2, size = (N + q * 2) * m;
  canvas.width = size; canvas.height = size;
  var ctx = canvas.getContext('2d');
  ctx.fillStyle = '#FFFFFF'; ctx.fillRect(0, 0, size, size);
  ctx.fillStyle = '#14232A';
  var s = 421157231;
  function rnd() { s ^= s << 13; s ^= s >>> 17; s ^= s << 5; return ((s >>> 0) / 4294967296); }
  function mod(x, y) { ctx.fillRect((x + q) * m, (y + q) * m, m, m); }
  function finder(fx, fy) {
    for (var y = 0; y < 7; y++) for (var x = 0; x < 7; x++) {
      if (x === 0 || x === 6 || y === 0 || y === 6 || (x >= 2 && x <= 4 && y >= 2 && y <= 4)) mod(fx + x, fy + y);
    }
  }
  finder(0, 0); finder(N - 7, 0); finder(0, N - 7);
  for (var i = 8; i < N - 8; i++) if (i % 2 === 0) { mod(i, 6); mod(6, i); }
  for (var y = 0; y < N; y++) for (var x = 0; x < N; x++) {
    var inF = (x < 9 && y < 9) || (x > N - 10 && y < 9) || (x < 9 && y > N - 10);
    if (inF || x === 6 || y === 6) continue;
    if (rnd() < 0.44) mod(x, y);
  }
})();
</script>
</body>
</html>
